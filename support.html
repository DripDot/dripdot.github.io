<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Ticket | DripDot Games</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            max-width: 400px; 
            width: 100%;
        }
        .header { text-align: center; margin-bottom: 25px; }
        .icon { font-size: 50px; color: #3498db; margin-bottom: 10px; }
        h1 { color: #2c3e50; margin: 0; font-size: 24px; }
        p { color: #7f8c8d; font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
        
        label { 
            display: block; 
            font-size: 12px; 
            font-weight: bold; 
            color: #2c3e50; 
            margin-bottom: 5px; 
            text-transform: uppercase;
        }
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            margin-bottom: 15px; 
            box-sizing: border-box; 
            font-family: inherit;
        }
        textarea { height: 100px; resize: none; }
        
        /* Permanent Locked Style */
        input[readonly] { 
            background-color: #f9f9f9; 
            color: #7f8c8d; 
            border: 1px solid #eee;
            cursor: not-allowed;
            font-weight: bold;
        }

        button { 
            width: 100%; 
            background-color: #3498db; 
            color: white; 
            padding: 15px; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }

        .footer { 
            text-align: center; 
            font-size: 11px; 
            color: #bdc3c7; 
            margin-top: 20px; 
            border-top: 1px solid #eee; 
            padding-top: 15px; 
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div class="icon">✉</div>
            <h1>Support Ticket</h1>
            <p>Your message will be sent to DripDot Games with your account details.</p>
        </div>

        <!-- REPLACE 'your_formspree_id' WITH YOUR ACTUAL KEY -->
        <form action="https://formspree.io/f/your_formspree_id" method="POST">
            
            <label for="playerIdField">Player ID</label>
            <input type="text" id="playerIdField" name="playerId" required readonly value="No ID Detected">

            <label for="email">Your Contact Email</label>
            <input type="email" name="email" id="email" required placeholder="To help us reply to you...">

            <label for="message">Issue Description</label>
            <textarea name="message" id="message" required placeholder="How can we help you?"></textarea>

            <button type="submit">Submit Request</button>
        </form>

        <div class="footer">
            DripDot Games Support Portal
        </div>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const playerId = urlParams.get('id');
            const idInput = document.getElementById('playerIdField');

            if (playerId && playerId !== "null" && playerId !== "") {
                idInput.value = playerId;
            } else {
                // If no ID is found, we keep it locked but show a warning
                idInput.value = "ERROR: ID NOT FOUND";
                idInput.style.color = "#e74c3c"; // Red text for error
            }
        };
    </script>
</body>
</html>
